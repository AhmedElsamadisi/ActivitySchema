name: Deploy frontend_site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - frontend_site/**
      - .github/workflows/deploy-frontend-site.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload frontend_site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
