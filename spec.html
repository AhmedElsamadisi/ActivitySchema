<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Activity Schema Spec</title>
  <meta name="description" content="The Activity Schema specification." />
  <style>
    :root {
      --bg: #fbfaf7;
      --ink: #161616;
      --muted: #62615d;
      --line: #e8e2d8;
      --panel: #ffffff;
      --accent: #2f6f68;
      --code: #f5f1ea;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.62;
    }
    .page { max-width: 900px; margin: 0 auto; padding: 28px 22px 80px; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 24px;
      margin-bottom: 38px;
      border-bottom: 1px solid var(--line);
    }
    a { color: var(--accent); }
    .brand { color: var(--ink); text-decoration: none; font-weight: 750; letter-spacing: -0.03em; }
    .back { color: var(--muted); text-decoration: none; font-size: 14px; }
    .back:hover { color: var(--ink); }
    h1, h2, h3 { letter-spacing: -0.04em; line-height: 1.12; }
    h1 { font-size: clamp(42px, 7vw, 68px); margin: 0 0 12px; }
    h2 { font-size: 32px; margin-top: 46px; padding-top: 10px; }
    h3 { font-size: 23px; margin-top: 32px; }
    p, li { color: #2c2b28; }
    .intro { color: var(--muted); font-size: 18px; margin-bottom: 34px; }
    code {
      background: var(--code);
      border-radius: 7px;
      padding: 2px 5px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: .92em;
    }
    pre {
      overflow: auto;
      padding: 18px;
      border-radius: 18px;
      background: #171717;
      color: #f7f2e9;
    }
    pre code { background: transparent; color: inherit; padding: 0; }
    blockquote {
      margin: 24px 0;
      padding: 2px 0 2px 18px;
      border-left: 3px solid var(--accent);
      color: var(--muted);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 22px 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      display: block;
      overflow-x: auto;
    }
    th, td { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: 13px; }
    img { max-width: 100%; border-radius: 18px; border: 1px solid var(--line); background: white; }
    .loading {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      background: var(--panel);
      color: var(--muted);
    }
    footer { margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--line); color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <a class="brand" href="/">Activity Schema</a>
      <a class="back" href="/">Back to home</a>
    </header>

    <main>
      <h1>Activity Schema Spec</h1>
      <p class="intro">The full open specification, rendered from <code>spec.md</code> in the GitHub repository.</p>
      <article id="content" class="loading">Loading spec…</article>
    </main>

    <footer>
      <span>Maintained on GitHub. If the spec does not load, open <a href="/spec.md">the Markdown version</a>.</span>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const target = document.getElementById('content');

    function renderFallback(markdown) {
      const pre = document.createElement('pre');
      pre.textContent = markdown;
      target.replaceChildren(pre);
      target.className = '';
    }

    fetch('/spec.md')
      .then((response) => {
        if (!response.ok) throw new Error('Could not load spec.md');
        return response.text();
      })
      .then((markdown) => {
        if (window.marked && window.marked.parse) {
          target.innerHTML = window.marked.parse(markdown);
          target.className = '';
        } else {
          renderFallback(markdown);
        }
      })
      .catch(() => {
        target.innerHTML = 'Could not load the embedded spec. Open <a href="/spec.md">the Markdown version</a> instead.';
      });
  </script>
</body>
</html>
